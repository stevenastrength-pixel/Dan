services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database across container restarts and updates
      - dan-data:/app/data
      # Bind-mount the OpenClaw workspace so context files are always current
      - /root/.openclaw/workspace:/app/workspace
    environment:
      - DATABASE_URL=file:/app/data/dan.db
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-long-random-secret}
      - OPENCLAW_DEBUG_LOGS=1
    restart: unless-stopped

volumes:
  dan-data:
